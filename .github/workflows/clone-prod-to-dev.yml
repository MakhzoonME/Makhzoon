name: Clone Prod to Dev

# Nightly mirror of prod Firestore + Auth into the dev Firebase project.
# Storage and per-collection real-time replication are handled separately
# by Cloud Functions on the prod project (see functions/ — stage 2).
#
# PII policy: this workflow runs WITHOUT --no-scrub-by-default, i.e. it
# uses --no-scrub. This was an explicit decision — see CLAUDE.md / ADR.
# Dev must therefore have the same access controls as prod.
#
# Required repo secrets:
#   PROD_SERVICE_ACCOUNT_JSON   Full JSON of a service-account key with
#                               Firestore + Auth read access on the prod
#                               Firebase project (makhzoonme-prod).
#   DEV_SERVICE_ACCOUNT_JSON    Full JSON of a service-account key with
#                               Firestore + Auth write access on the dev
#                               Firebase project (makhzoonme-dev).
#   FIREBASE_TOKEN              Output of `firebase login:ci`. Used by the
#                               auth-clone job for `firebase auth:export/import`.
#   AUTH_HASH_ALGO              e.g. SCRYPT
#   AUTH_HASH_KEY               base64 signer key from prod Identity Toolkit
#   AUTH_SALT_SEPARATOR         base64 salt separator
#   AUTH_HASH_ROUNDS            e.g. 8
#   AUTH_HASH_MEM_COST          e.g. 14
#
# To rotate or regenerate the AUTH_HASH_* values:
#   gcloud auth print-access-token
#   curl -H "Authorization: Bearer <token>" \
#     https://identitytoolkit.googleapis.com/admin/v2/projects/makhzoonme-prod/config

on:
  schedule:
    # 02:00 UTC daily (off-peak across MENA/EU/US). Adjust if needed.
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (Firestore only — no writes)'
        type: boolean
        default: false
      skip_auth:
        description: 'Skip auth clone (Firestore only)'
        type: boolean
        default: false

# Only one nightly clone may run at a time. A new run cancels the previous.
concurrency:
  group: clone-prod-to-dev
  cancel-in-progress: false

jobs:
  firestore:
    name: Clone Firestore prod → dev
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write service-account key files
        env:
          PROD_SA: ${{ secrets.PROD_SERVICE_ACCOUNT_JSON }}
          DEV_SA: ${{ secrets.DEV_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p .sa
          printf '%s' "$PROD_SA" > .sa/prod.json
          printf '%s' "$DEV_SA"  > .sa/dev.json
          chmod 600 .sa/*.json
          # Sanity-check both are valid JSON and point at different projects
          node -e "
            const p = require('./.sa/prod.json');
            const d = require('./.sa/dev.json');
            if (!p.project_id || !d.project_id) { console.error('missing project_id'); process.exit(1); }
            if (p.project_id === d.project_id) { console.error('prod and dev project_id are equal — refusing'); process.exit(1); }
            console.log('prod:', p.project_id, '→ dev:', d.project_id);
          "

      - name: Run Firestore clone
        env:
          PROD_SERVICE_ACCOUNT_PATH: .sa/prod.json
          TARGET_SERVICE_ACCOUNT_PATH: .sa/dev.json
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            npx ts-node --compiler-options '{"module":"commonjs"}' \
              scripts/clone-firestore.ts --target=dev --no-scrub --yes --dry-run
          else
            npx ts-node --compiler-options '{"module":"commonjs"}' \
              scripts/clone-firestore.ts --target=dev --no-scrub --yes
          fi

      - name: Shred service-account keys
        if: always()
        run: rm -rf .sa

  auth:
    name: Clone Auth prod → dev
    runs-on: ubuntu-latest
    needs: firestore
    if: ${{ github.event.inputs.skip_auth != 'true' }}
    timeout-minutes: 20
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      AUTH_HASH_ALGO: ${{ secrets.AUTH_HASH_ALGO }}
      AUTH_HASH_KEY: ${{ secrets.AUTH_HASH_KEY }}
      AUTH_SALT_SEPARATOR: ${{ secrets.AUTH_SALT_SEPARATOR }}
      AUTH_HASH_ROUNDS: ${{ secrets.AUTH_HASH_ROUNDS }}
      AUTH_HASH_MEM_COST: ${{ secrets.AUTH_HASH_MEM_COST }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install firebase-tools
        run: npm i -g firebase-tools

      - name: Run Auth clone
        run: |
          npx ts-node --compiler-options '{"module":"commonjs"}' \
            scripts/clone-auth.ts prod dev --yes

      - name: Shred exported auth file (defense in depth — script already deletes it)
        if: always()
        run: find . -maxdepth 1 -name 'auth-export-prod-*.json' -delete || true
