name: Deploy Mirror Functions

# Deploys the prod→dev mirror Cloud Functions to the PROD Firebase project.
# Manual trigger only — these are infrastructure, not app code, so we don't
# want every push to redeploy them.
#
# Required repo secrets:
#   FIREBASE_TOKEN                 firebase login:ci  (Owner on makhzoonme-prod)
#   DEV_SERVICE_ACCOUNT_JSON       reused from clone-prod-to-dev workflow
#
# The DEV_SERVICE_ACCOUNT_JSON secret is uploaded to Google Secret Manager
# on the prod project on every deploy (idempotent). Functions reference it
# via defineSecret('DEV_SERVICE_ACCOUNT_JSON') in code.

on:
  workflow_dispatch:
    inputs:
      blaze_confirmed:
        description: 'Type BLAZE-CONFIRMED to acknowledge the prod project is on the Blaze plan (otherwise this deploy will fail)'
        type: string
        required: true
        default: ''
      dry_run:
        description: 'Dry run (build only, do not deploy)'
        type: boolean
        default: false

concurrency:
  group: deploy-mirror-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
    steps:
      - name: Refuse if Blaze not confirmed
        if: ${{ github.event.inputs.blaze_confirmed != 'BLAZE-CONFIRMED' }}
        run: |
          echo "::error::Mirror functions require the prod Firebase project to be on the Blaze plan."
          echo "::error::Re-run with input 'BLAZE-CONFIRMED' once the upgrade is done."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install functions deps + build
        working-directory: functions
        run: |
          npm install
          npm run build

      - name: Install firebase-tools
        run: npm i -g firebase-tools

      - name: Upload DEV_SERVICE_ACCOUNT_JSON to Secret Manager (prod project)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo '${{ secrets.DEV_SERVICE_ACCOUNT_JSON }}' > dev-sa.json
          # Set/update the secret; --force adds a new version each time.
          printf '%s' "$(cat dev-sa.json)" | firebase functions:secrets:set DEV_SERVICE_ACCOUNT_JSON \
            --project prod --data-file -
          rm -f dev-sa.json

      - name: Deploy functions to prod
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: firebase deploy --only functions:mirror --project prod --non-interactive --force

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Build succeeded. Deploy skipped (dry_run)."
