# Deploys the Next.js + OpenNext app to Cloudflare Workers.
# Branch → environment mapping mirrors wrangler.toml:
#   DevBranch → makhzoon-dev      (dev.makhzoon.me)
#   STGBranch → makhzoon-staging  (stage.makhzoon.me)
#   main      → makhzoon-prod     (app.makhzoon.me)
#
# Requires repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — "Edit Cloudflare Workers" token
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
# Server-side env (Supabase service key, RESEND_*, CRON_SECRET) live as
# Worker secrets set per env in the Cloudflare dashboard, not here.

name: Deploy

on:
  push:
    branches: [DevBranch, STGBranch, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=8192
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy (dev)
        if: github.ref == 'refs/heads/DevBranch'
        run: npm run cf:deploy:dev

      - name: Deploy (staging)
        if: github.ref == 'refs/heads/STGBranch'
        run: npm run cf:deploy:staging

      - name: Deploy (production)
        if: github.ref == 'refs/heads/main'
        run: npm run cf:deploy:prod
