<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audit Logs — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="audit-logs" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <div><h1 class="text-xl font-semibold text-slate-900">Audit Logs</h1></div>
            </div>
            <div class="flex items-center gap-2">
              <div class="inline-flex rounded-lg border border-slate-200 p-0.5 text-sm">
                <button class="px-3 py-1 rounded-md bg-primary text-white font-medium">Space</button>
                <button class="px-3 py-1 rounded-md text-slate-500">Org</button>
              </div>
              <button class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="download" class="!w-4 !h-4"></i>Export CSV</button>
            </div>
          </div>

          <div class="flex flex-wrap items-center gap-2 mb-3">
            <button class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="calendar" class="!w-4 !h-4"></i>Jun 5 – Jun 13</button>
            <select class="h-9 px-3 rounded-lg border border-slate-200 text-sm text-slate-600"><option>All modules</option><option>Usool</option><option>Raseed</option><option>Haraka</option><option>Requests</option><option>Settings</option></select>
            <select class="h-9 px-3 rounded-lg border border-slate-200 text-sm text-slate-600"><option>All actions</option><option>create</option><option>update</option><option>delete</option><option>approve</option></select>
            <select class="h-9 px-3 rounded-lg border border-slate-200 text-sm text-slate-600"><option>All users</option><option>Sara Khalil</option><option>Omar Nasser</option><option>Nour Saleh</option></select>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-[13px]">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide"><tr>
                <th class="px-4 py-2.5 text-left font-semibold">Timestamp</th><th class="px-4 py-2.5 text-left font-semibold">User</th>
                <th class="px-4 py-2.5 text-left font-semibold">Action</th><th class="px-4 py-2.5 text-left font-semibold">Module</th>
                <th class="px-4 py-2.5 text-left font-semibold">Record ID</th><th class="px-4 py-2.5 text-left font-semibold">Space</th>
              </tr></thead>
              <tbody id="rows" class="divide-y divide-slate-50"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-misc.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const MV = App.seed.auditModuleVariant;
    document.getElementById('rows').innerHTML = App.seed.auditLogs.map((l) => `<tr class="hover:bg-slate-50">
      <td class="px-4 py-2 text-slate-500 font-mono whitespace-nowrap">${l.ts}</td>
      <td class="px-4 py-2 text-slate-700">${l.user}</td>
      <td class="px-4 py-2">${App.ui.badge(l.action, MV[l.module])}</td>
      <td class="px-4 py-2 text-slate-600">${l.module}</td>
      <td class="px-4 py-2 font-mono text-slate-500">${l.record}</td>
      <td class="px-4 py-2 text-slate-500">${l.space}</td></tr>`).join('');
    App.ui.icons();
  </script>
</body>
</html>
