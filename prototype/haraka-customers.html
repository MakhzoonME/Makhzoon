<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Customers — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="customers" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <span class="w-1.5 h-6 rounded bg-haraka"></span>
              <div><h1 class="text-xl font-semibold text-slate-900">Customers <span class="text-slate-400 font-normal text-base">· Haraka</span></h1><p class="text-sm text-slate-500">6 customers</p></div>
            </div>
            <button class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5"><i data-lucide="plus" class="!w-4 !h-4"></i>New Customer</button>
          </div>
          <div class="flex items-center gap-2 mb-3">
            <div class="relative"><i data-lucide="search" class="!w-4 !h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i><input type="text" placeholder="Search by name or phone…" class="h-9 w-64 pl-9 pr-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" /></div>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide"><tr>
                <th class="px-4 py-3 text-left font-semibold">Name</th><th class="px-4 py-3 text-left font-semibold">Phone</th>
                <th class="px-4 py-3 text-left font-semibold">Email</th><th class="px-4 py-3 text-left font-semibold">Tax No</th>
                <th class="px-4 py-3 text-right font-semibold">Total Orders</th><th class="px-4 py-3 text-left font-semibold">Last Purchase</th><th class="w-10 px-4 py-3"></th>
              </tr></thead>
              <tbody id="rows" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-haraka.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    document.getElementById('rows').innerHTML = App.seed.customers.map((c) => {
      const init = c.name.split(' ').map((w) => w[0]).join('').slice(0, 2);
      return `<tr class="hover:bg-slate-50 cursor-pointer">
        <td class="px-4 py-3"><div class="flex items-center gap-2.5">${App.ui.avatar(init, '#4F46E5')}<span class="font-medium text-slate-800">${c.name}</span></div></td>
        <td class="px-4 py-3 text-slate-600">${c.phone}</td><td class="px-4 py-3 text-slate-600">${c.email}</td>
        <td class="px-4 py-3 text-slate-500 font-mono text-xs">${c.tax}</td><td class="px-4 py-3 text-right font-medium text-slate-800">${c.orders}</td>
        <td class="px-4 py-3 text-slate-500">${c.last}</td><td class="px-4 py-3 text-slate-300"><i data-lucide="more-horizontal" class="!w-4 !h-4"></i></td></tr>`;
    }).join('');
    App.ui.icons();
  </script>
</body>
</html>
