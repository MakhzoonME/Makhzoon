<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Haraka · POS Register — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
  <style>.cat-tab.active{background:#4F46E5;color:#fff;border-color:#4F46E5;}</style>
</head>
<body data-page="register" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <!-- Module header + actions -->
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <span class="w-1.5 h-6 rounded bg-haraka"></span>
              <div><h1 class="text-xl font-semibold text-slate-900">Haraka <span class="text-slate-400 font-normal text-base">· POS Register</span></h1><p class="text-sm text-slate-500">Point of sale, orders & sales</p></div>
            </div>
            <div class="flex items-center gap-2">
              <a href="haraka-orders.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="shopping-bag" class="!w-4 !h-4"></i>New Order</a>
              <a href="haraka-transactions.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="receipt" class="!w-4 !h-4"></i>Transactions</a>
              <a href="haraka-reports.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="bar-chart-3" class="!w-4 !h-4"></i>Reports</a>
            </div>
          </div>

          <!-- Module stats -->
          <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

          <!-- POS Register -->
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="scan-barcode" class="!w-4 !h-4 text-haraka"></i>
            <h2 class="font-semibold text-slate-800">POS Register</h2>
            <span class="inline-flex items-center gap-1.5 text-xs text-slate-500 ml-2"><span class="w-2 h-2 rounded-full bg-green-500"></span>Session open · Main Branch</span>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden" style="height:600px">
            <div class="flex h-full">
              <!-- Product grid -->
              <div class="flex-1 min-w-0 flex flex-col p-4 overflow-hidden">
                <div class="relative mb-3">
                  <i data-lucide="scan-line" class="!w-4 !h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
                  <input type="text" placeholder="Start typing or scan barcode…" class="w-full h-10 pl-9 pr-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                </div>
                <div id="cats" class="flex gap-2 mb-3 flex-wrap"></div>
                <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 overflow-y-auto pr-1"></div>
              </div>
              <!-- Cart -->
              <div class="w-[360px] shrink-0 bg-slate-50/50 border-l border-slate-200 flex flex-col">
                <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between bg-white">
                  <div class="font-semibold text-slate-800">Current Sale</div>
                  <div class="flex gap-1.5">
                    <button class="h-8 px-2.5 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1"><i data-lucide="pause" class="!w-3.5 !h-3.5"></i>Hold</button>
                    <button class="h-8 px-2.5 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1"><i data-lucide="rotate-ccw" class="!w-3.5 !h-3.5"></i>Recall</button>
                  </div>
                </div>
                <button class="m-3 h-9 rounded-lg border border-dashed border-slate-300 text-sm text-slate-500 hover:border-primary hover:text-primary inline-flex items-center justify-center gap-1.5 bg-white"><i data-lucide="user-plus" class="!w-4 !h-4"></i>Add customer</button>
                <div id="cart" class="flex-1 overflow-y-auto px-3 divide-y divide-slate-100 bg-white mx-3 rounded-lg border border-slate-100"></div>
                <div class="border-t border-slate-200 p-4 space-y-2 bg-white">
                  <div class="flex justify-between text-sm text-slate-500"><span>Subtotal</span><span id="subtotal"></span></div>
                  <div class="flex justify-between text-sm text-slate-500 items-center"><span>Discount</span><input type="text" value="$0.00" class="w-20 h-7 px-2 text-right rounded border border-slate-200 text-sm" /></div>
                  <div class="flex justify-between text-lg font-bold text-slate-900 pt-1 border-t border-slate-100"><span>Total</span><span id="total"></span></div>
                  <button onclick="openPay('Cash')" class="w-full h-11 rounded-lg bg-primary text-white font-semibold hover:opacity-90 flex items-center justify-between px-4"><span>Charge</span><span id="charge-total"></span></button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Payment modal -->
  <div id="pay-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-slate-900/50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md">
      <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
        <h3 class="font-semibold text-slate-800">Payment · <span id="pay-method"></span></h3>
        <button onclick="closePay()" class="text-slate-400 hover:text-slate-700"><i data-lucide="x" class="!w-5 !h-5"></i></button>
      </div>
      <div class="p-5 space-y-4">
        <div class="text-center"><div class="text-xs uppercase text-slate-400">Amount Due</div><div id="pay-due" class="text-3xl font-bold text-slate-900"></div></div>
        <div><label class="text-sm text-slate-500">Amount Tendered</label><input id="tendered" type="number" value="50" oninput="calcChange()" class="w-full h-11 px-3 mt-1 rounded-lg border border-slate-200 text-lg font-semibold focus:outline-none focus:border-primary" /></div>
        <div class="grid grid-cols-3 gap-2">
          <button onclick="setMethod('Cash')" class="pay-m h-9 rounded-lg border border-slate-200 text-sm font-medium hover:bg-slate-50">Cash</button>
          <button onclick="setMethod('Card')" class="pay-m h-9 rounded-lg border border-slate-200 text-sm font-medium hover:bg-slate-50">Card</button>
          <button onclick="setMethod('Other')" class="pay-m h-9 rounded-lg border border-slate-200 text-sm font-medium hover:bg-slate-50">Other</button>
        </div>
        <div class="flex justify-between items-center bg-slate-50 rounded-lg px-4 py-3"><span class="text-sm text-slate-500">Change Due</span><span id="change" class="text-xl font-bold text-green-600"></span></div>
      </div>
      <div class="px-5 py-4 border-t border-slate-100 flex gap-2">
        <button onclick="closePay()" class="flex-1 h-11 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
        <button onclick="closePay()" class="flex-1 h-11 rounded-lg bg-primary text-white text-sm font-semibold hover:opacity-90">Complete Sale</button>
      </div>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-haraka.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const stats = [
      { label: "Today's Sales", value: '$1,284.50', icon: 'dollar-sign' },
      { label: 'Orders Today', value: '12', icon: 'shopping-bag' },
      { label: 'Transactions', value: '38', icon: 'receipt' },
      { label: 'Customers', value: '6', icon: 'users' },
    ];
    document.getElementById('stats').innerHTML = stats.map((s) => `<div class="bg-white rounded-xl border border-slate-200 border-l-4 border-l-haraka p-4">
      <div class="flex items-center justify-between"><span class="text-[13px] font-medium text-slate-500">${s.label}</span><span class="grid place-items-center w-8 h-8 rounded-lg bg-haraka/10 text-haraka"><i data-lucide="${s.icon}" class="!w-4 !h-4"></i></span></div>
      <div class="mt-2 text-xl font-bold text-slate-900">${s.value}</div></div>`).join('');

    const cats = ['All', 'Beverages', 'Food', 'Electronics'];
    let activeCat = 'All';
    function renderCats() {
      document.getElementById('cats').innerHTML = cats.map((c) => `<button onclick="activeCat='${c}';renderCats();renderGrid()" class="cat-tab ${c === activeCat ? 'active' : ''} h-9 px-4 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">${c}</button>`).join('');
    }
    function renderGrid() {
      const items = App.seed.products.filter((p) => activeCat === 'All' || p.category === activeCat);
      document.getElementById('grid').innerHTML = items.map((p) => `<button class="bg-white rounded-xl border border-slate-200 p-3 text-left hover:border-primary hover:shadow-sm transition">
        <div class="h-16 rounded-lg mb-2 grid place-items-center text-white" style="background:${p.color}"><i data-lucide="utensils" class="!w-6 !h-6 opacity-80"></i></div>
        <div class="text-sm font-medium text-slate-800 truncate">${p.name}</div>
        <div class="flex items-center justify-between mt-1"><span class="text-sm font-semibold text-slate-700">${App.ui.money(p.price)}</span><span class="w-6 h-6 rounded-full bg-primary/10 text-primary grid place-items-center"><i data-lucide="plus" class="!w-3.5 !h-3.5"></i></span></div>
      </button>`).join('');
      App.ui.icons();
    }
    function renderCart() {
      const c = App.seed.cart;
      document.getElementById('cart').innerHTML = c.map((l) => `<div class="py-2.5 px-3 flex items-center gap-3">
        <div class="flex-1 min-w-0"><div class="text-sm font-medium text-slate-800 truncate">${l.name}</div><div class="text-xs text-slate-400">${App.ui.money(l.price)} each</div></div>
        <div class="flex items-center gap-1.5"><button class="w-6 h-6 rounded border border-slate-200 text-slate-500">−</button><span class="w-6 text-center text-sm font-medium">${l.qty}</span><button class="w-6 h-6 rounded border border-slate-200 text-slate-500">+</button></div>
        <div class="w-16 text-right text-sm font-semibold text-slate-800">${App.ui.money(l.price * l.qty)}</div></div>`).join('');
      const sub = c.reduce((s, l) => s + l.price * l.qty, 0);
      document.getElementById('subtotal').textContent = App.ui.money(sub);
      document.getElementById('total').textContent = App.ui.money(sub);
      document.getElementById('charge-total').textContent = App.ui.money(sub);
      window._due = sub;
    }
    function openPay(method) {
      document.getElementById('pay-method').textContent = method;
      document.getElementById('pay-due').textContent = App.ui.money(window._due);
      const m = document.getElementById('pay-modal'); m.classList.remove('hidden'); m.classList.add('flex');
      calcChange(); App.ui.icons();
    }
    function setMethod(m) { document.getElementById('pay-method').textContent = m; }
    function closePay() { const m = document.getElementById('pay-modal'); m.classList.add('hidden'); m.classList.remove('flex'); }
    function calcChange() {
      const t = parseFloat(document.getElementById('tendered').value) || 0;
      document.getElementById('change').textContent = App.ui.money(Math.max(0, t - window._due));
    }
    renderCats(); renderGrid(); renderCart(); App.ui.icons();
  </script>
</body>
</html>
