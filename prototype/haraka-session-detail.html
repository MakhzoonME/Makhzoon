<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Haraka · Session Detail — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="sessions" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">

          <!-- Module header -->
          <div class="flex items-center justify-between mb-6">
            <div class="flex items-center gap-3">
              <a href="haraka-sessions.html" class="text-sm text-slate-500 hover:text-slate-800 inline-flex items-center gap-1">
                <i data-lucide="arrow-left" class="!w-4 !h-4"></i>Sessions
              </a>
              <span class="text-slate-300">/</span>
              <h1 class="text-xl font-semibold text-slate-900">Haraka <span class="text-slate-400 font-normal text-base">· Session Detail</span></h1>
            </div>
            <div id="header-actions"></div>
          </div>

          <!-- Summary card -->
          <div class="bg-white rounded-xl border border-slate-200 border-l-4 border-l-haraka p-5 mb-6">
            <div id="summary-meta" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"></div>
          </div>

          <!-- Stat cards -->
          <div id="stat-cards" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6"></div>

          <!-- Transactions table -->
          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-4 py-3 border-b border-slate-100">
              <h2 class="text-sm font-semibold text-slate-700">Transactions</h2>
            </div>
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-3 text-left font-semibold">ID</th>
                  <th class="px-4 py-3 text-left font-semibold">Customer</th>
                  <th class="px-4 py-3 text-left font-semibold">Items</th>
                  <th class="px-4 py-3 text-right font-semibold">Total</th>
                  <th class="px-4 py-3 text-left font-semibold">Method</th>
                  <th class="px-4 py-3 text-left font-semibold">Time</th>
                  <th class="px-4 py-3 text-left font-semibold">Status</th>
                </tr>
              </thead>
              <tbody id="txn-rows" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-haraka.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const sd = App.seed.sessionDetail;
    const isOpen = sd.status === 'open';

    // Header actions
    if (isOpen) {
      document.getElementById('header-actions').innerHTML = `
        <button onclick="if(confirm('Close this session?')){alert('Session closed.');}" class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5">
          <i data-lucide="lock" class="!w-4 !h-4"></i>Close Session
        </button>`;
    }

    // Summary meta
    const sessionStatusVariant = { open: 'green', closed: 'slate' };
    const meta = [
      { label: 'Session ID', value: `<span class="text-haraka font-mono text-xs font-semibold">${sd.id}</span>` },
      { label: 'Cashier', value: sd.cashier },
      { label: 'Branch', value: sd.branch },
      { label: 'Status', value: App.ui.badge(sd.status === 'open' ? 'Open' : 'Closed', sessionStatusVariant[sd.status]) },
      { label: 'Opened', value: `<span class="font-mono text-xs text-slate-500">${sd.opened}</span>` },
      { label: 'Opening Float', value: `<span class="font-mono text-slate-700">${App.ui.money(sd.openingFloat)}</span>` },
    ];
    document.getElementById('summary-meta').innerHTML = meta.map((m) => `
      <div>
        <div class="text-[11px] uppercase tracking-wide text-slate-400 font-semibold mb-1">${m.label}</div>
        <div class="text-sm text-slate-800">${m.value}</div>
      </div>`).join('');

    // Stat cards
    const stats = [
      { label: 'Sales Total', value: App.ui.money(sd.salesTotal), icon: 'dollar-sign' },
      { label: 'Transactions', value: sd.txnCount, icon: 'receipt' },
      { label: 'Expected Cash on Hand', value: App.ui.money(sd.expectedCash), icon: 'wallet' },
    ];
    document.getElementById('stat-cards').innerHTML = stats.map((s) => `
      <div class="bg-white rounded-xl border border-slate-200 border-l-4 border-l-haraka p-4">
        <div class="flex items-center justify-between">
          <span class="text-[13px] font-medium text-slate-500">${s.label}</span>
          <span class="grid place-items-center w-8 h-8 rounded-lg bg-haraka/10 text-haraka"><i data-lucide="${s.icon}" class="!w-4 !h-4"></i></span>
        </div>
        <div class="mt-2 text-xl font-bold text-slate-900">${s.value}</div>
      </div>`).join('');

    // Transactions
    const TV = App.seed.txnStatusVariant;
    document.getElementById('txn-rows').innerHTML = sd.transactions.map((t) => `
      <tr class="hover:bg-slate-50">
        <td class="px-4 py-3 text-haraka font-mono text-xs font-semibold">
          <a href="haraka-transaction-detail.html" class="hover:underline">${t.id}</a>
        </td>
        <td class="px-4 py-3 text-slate-700">${t.customer}</td>
        <td class="px-4 py-3 text-slate-500">${t.items}</td>
        <td class="px-4 py-3 text-right font-mono text-slate-700">${App.ui.money(t.total)}</td>
        <td class="px-4 py-3 text-slate-600">${t.method}</td>
        <td class="px-4 py-3 text-slate-500 font-mono text-xs">${t.time}</td>
        <td class="px-4 py-3">${App.ui.badge(t.status, TV[t.status])}</td>
      </tr>`).join('');

    App.ui.icons();
  </script>
</body>
</html>
