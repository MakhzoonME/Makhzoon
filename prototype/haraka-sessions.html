<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Haraka · Sessions — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="sessions" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <!-- Module header + actions -->
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <div><h1 class="text-xl font-semibold text-slate-900">Haraka <span class="text-slate-400 font-normal text-base">· Sessions</span></h1></div>
            </div>
            <div class="flex items-center gap-2">
              <a href="haraka-orders.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="shopping-bag" class="!w-4 !h-4"></i>New Order</a>
              <a href="haraka-transactions.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="receipt" class="!w-4 !h-4"></i>Transactions</a>
              <a href="haraka-reports.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="bar-chart-3" class="!w-4 !h-4"></i>Reports</a>
              <a href="haraka-register.html" class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5"><i data-lucide="scan-barcode" class="!w-4 !h-4"></i>Open POS Register</a>
            </div>
          </div>

          <!-- Module stats -->
          <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

          <!-- Sessions table -->
          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-3 text-left font-semibold">Session</th>
                  <th class="px-4 py-3 text-left font-semibold">Cashier</th>
                  <th class="px-4 py-3 text-left font-semibold">Branch</th>
                  <th class="px-4 py-3 text-right font-semibold">Opening Float</th>
                  <th class="px-4 py-3 text-right font-semibold">Discrepancy</th>
                  <th class="px-4 py-3 text-left font-semibold">Status</th>
                  <th class="px-4 py-3 text-left font-semibold">Opened</th>
                  <th class="px-4 py-3 text-left font-semibold">Closed</th>
                </tr>
              </thead>
              <tbody id="rows" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-haraka.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const stats = [
      { label: "Today's Sales", value: '$1,284.50', icon: 'dollar-sign' },
      { label: 'Orders Today', value: '12', icon: 'shopping-bag' },
      { label: 'Transactions', value: '38', icon: 'receipt' },
      { label: 'Customers', value: '6', icon: 'users' },
    ];
    document.getElementById('stats').innerHTML = stats.map((s) => `<div class="bg-white rounded-xl border border-slate-200 border-l-4 border-l-haraka p-4">
      <div class="flex items-center justify-between"><span class="text-[13px] font-medium text-slate-500">${s.label}</span><span class="grid place-items-center w-8 h-8 rounded-lg bg-haraka/10 text-haraka"><i data-lucide="${s.icon}" class="!w-4 !h-4"></i></span></div>
      <div class="mt-2 text-xl font-bold text-slate-900">${s.value}</div></div>`).join('');

    const V = App.seed.sessionStatusVariant;
    document.getElementById('rows').innerHTML = App.seed.posSessions.map((s) => `<tr class="hover:bg-slate-50">
      <td class="px-4 py-3 font-mono text-xs font-semibold text-haraka">${s.id}</td>
      <td class="px-4 py-3 text-slate-600">${s.cashier}</td>
      <td class="px-4 py-3 text-slate-600">${s.branch}</td>
      <td class="px-4 py-3 text-right font-mono text-slate-700">${App.ui.money(s.openingFloat)}</td>
      <td class="px-4 py-3 text-right font-mono ${s.discrepancy == null ? 'text-slate-400' : s.discrepancy === 0 ? 'text-slate-500' : s.discrepancy > 0 ? 'text-green-600' : 'text-red-600'}">${s.discrepancy == null ? '—' : (s.discrepancy >= 0 ? '+' : '') + s.discrepancy.toFixed(2)}</td>
      <td class="px-4 py-3">${App.ui.badge(s.status === 'open' ? 'Open' : 'Closed', V[s.status])}</td>
      <td class="px-4 py-3 text-slate-500 font-mono text-xs">${s.opened}</td>
      <td class="px-4 py-3 text-slate-500 font-mono text-xs">${s.closed || '—'}</td>
    </tr>`).join('');

    App.ui.icons();
  </script>
</body>
</html>
