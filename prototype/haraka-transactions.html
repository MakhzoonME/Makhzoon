<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transactions — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="transactions" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <span class="w-1.5 h-6 rounded bg-haraka"></span>
              <div><h1 class="text-xl font-semibold text-slate-900">Transactions <span class="text-slate-400 font-normal text-base">· Haraka</span></h1><p class="text-sm text-slate-500">All POS sales across sessions</p></div>
            </div>
            <div class="flex items-center gap-2">
              <button class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="calendar" class="!w-4 !h-4"></i>Jun 1 – Jun 13</button>
              <a href="haraka-reports.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="bar-chart-3" class="!w-4 !h-4"></i>Reports</a>
              <button class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="download" class="!w-4 !h-4"></i>Export CSV</button>
            </div>
          </div>

          <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5"></div>

          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide"><tr>
                <th class="px-4 py-3 text-left font-semibold">Receipt No</th><th class="px-4 py-3 text-left font-semibold">Customer</th>
                <th class="px-4 py-3 text-right font-semibold">Items</th><th class="px-4 py-3 text-right font-semibold">Total</th>
                <th class="px-4 py-3 text-left font-semibold">Payment Method</th><th class="px-4 py-3 text-left font-semibold">Cashier</th>
                <th class="px-4 py-3 text-left font-semibold">Time</th><th class="px-4 py-3 text-left font-semibold">Status</th>
              </tr></thead>
              <tbody id="rows" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-haraka.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const stats = [
      { label: "Today's Sales", value: '$1,284.50', icon: 'dollar-sign', color: '#C2185B' },
      { label: 'Transaction Count', value: '38', icon: 'receipt', color: '#4F46E5' },
      { label: 'Avg Order Value', value: '$33.80', icon: 'trending-up', color: '#00695C' },
      { label: 'Top Item', value: 'Chicken Shawarma', icon: 'award', color: '#E65100' },
    ];
    document.getElementById('stats').innerHTML = stats.map((s) => `<div class="bg-white rounded-xl border border-slate-200 border-l-4 p-4" style="border-left-color:${s.color}">
      <div class="flex items-center justify-between"><span class="text-[13px] font-medium text-slate-500">${s.label}</span><span class="grid place-items-center w-8 h-8 rounded-lg" style="background:${s.color}1a;color:${s.color}"><i data-lucide="${s.icon}" class="!w-4 !h-4"></i></span></div>
      <div class="mt-2 text-xl font-bold text-slate-900 truncate">${s.value}</div></div>`).join('');

    const SV = App.seed.txnStatusVariant;
    document.getElementById('rows').innerHTML = App.seed.transactions.map((t) => `<tr class="hover:bg-slate-50">
      <td class="px-4 py-3 font-medium text-slate-800">${t.id}</td><td class="px-4 py-3 text-slate-600">${t.customer}</td>
      <td class="px-4 py-3 text-right text-slate-600">${t.items}</td><td class="px-4 py-3 text-right font-medium text-slate-800">${App.ui.money(t.total)}</td>
      <td class="px-4 py-3 text-slate-600">${t.method}</td><td class="px-4 py-3 text-slate-600">${t.cashier}</td>
      <td class="px-4 py-3 text-slate-500">${t.time}</td><td class="px-4 py-3">${App.ui.badge(t.status, SV[t.status])}</td></tr>`).join('');
    App.ui.icons();
  </script>
</body>
</html>
