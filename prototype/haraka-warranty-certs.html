<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Haraka · Warranty Certificates — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="warranty-certs" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">

          <!-- Module header -->
          <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-semibold text-slate-900">Haraka <span class="text-slate-400 font-normal text-base">· Warranty Certs</span></h1>
          </div>

          <!-- Table -->
          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-3 text-left font-semibold">Certificate #</th>
                  <th class="px-4 py-3 text-left font-semibold">Customer</th>
                  <th class="px-4 py-3 text-left font-semibold">Phone</th>
                  <th class="px-4 py-3 text-left font-semibold">Product</th>
                  <th class="px-4 py-3 text-left font-semibold">Serial</th>
                  <th class="px-4 py-3 text-left font-semibold">Issued</th>
                  <th class="px-4 py-3 text-left font-semibold">Expires</th>
                  <th class="px-4 py-3 text-left font-semibold">Transaction</th>
                </tr>
              </thead>
              <tbody id="rows" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>

        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-haraka.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    document.getElementById('rows').innerHTML = App.seed.warrantyCerts.map((c) => `
      <tr class="hover:bg-slate-50">
        <td class="px-4 py-3 text-haraka font-mono text-xs font-semibold">${c.id}</td>
        <td class="px-4 py-3 font-medium text-slate-800">${c.customer}</td>
        <td class="px-4 py-3 text-slate-500 font-mono text-xs">${c.phone}</td>
        <td class="px-4 py-3 text-slate-700">${c.product}</td>
        <td class="px-4 py-3 font-mono text-xs text-slate-500">${c.serial}</td>
        <td class="px-4 py-3 text-slate-500 text-xs">${c.issuedAt}</td>
        <td class="px-4 py-3 text-slate-500 text-xs">${c.expiresAt}</td>
        <td class="px-4 py-3">
          <a href="haraka-transactions.html" class="text-haraka font-mono text-xs font-semibold hover:underline">${c.txn}</a>
        </td>
      </tr>`).join('');

    App.ui.icons();
  </script>
</body>
</html>
