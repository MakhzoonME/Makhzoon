<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>USB-C Cable 1m — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
  <style>
    .tab-btn.active { color: #4F46E5; border-color: #4F46E5; }
    .field-row { display:grid; grid-template-columns:150px 1fr; padding:.5rem 0; border-bottom:1px solid #f1f5f9; }
    .field-row dt { color:#64748b; font-size:.8125rem; } .field-row dd { color:#1e293b; font-weight:500; font-size:.875rem; }
  </style>
</head>
<body data-page="inventory" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6 max-w-[1100px] mx-auto">
          <a href="raseed-list.html" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 mb-3"><i data-lucide="arrow-left" class="!w-4 !h-4"></i>Back to Inventory</a>
          <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-3">
              <span class="w-1.5 h-8 rounded bg-raseed"></span>
              <div><h1 class="text-xl font-semibold text-slate-900">USB-C Cable 1m</h1><p class="text-sm text-slate-500">INV-2002 · CBL-USBC-1M</p></div>
            </div>
            <div class="flex items-center gap-2">
              <button class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="plus-minus" class="!w-4 !h-4"></i>Adjust Stock</button>
              <button class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="pencil" class="!w-4 !h-4"></i>Edit</button>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
              <!-- Info -->
              <div class="bg-white rounded-xl border border-slate-200 p-5">
                <dl id="info" class="grid grid-cols-2 gap-x-8"></dl>
              </div>
              <!-- Tabs -->
              <div class="bg-white rounded-xl border border-slate-200">
                <div class="border-b border-slate-100 px-2 flex gap-1">
                  <button data-tab="txns" class="tab-btn active px-3 py-3 text-sm font-medium border-b-2 -mb-px text-slate-500 border-transparent">Transactions</button>
                  <button data-tab="po" class="tab-btn px-3 py-3 text-sm font-medium border-b-2 -mb-px text-slate-500 border-transparent">Purchases</button>
                </div>
                <div class="p-5">
                  <div data-panel="txns">
                    <table class="w-full text-sm">
                      <thead class="text-xs uppercase text-slate-400"><tr>
                        <th class="text-left font-semibold pb-2">Date</th><th class="text-left font-semibold pb-2">Type</th>
                        <th class="text-right font-semibold pb-2">Qty</th><th class="text-left font-semibold pb-2 pl-4">Reason</th>
                        <th class="text-left font-semibold pb-2">Performed By</th></tr></thead>
                      <tbody id="ledger" class="divide-y divide-slate-100"></tbody>
                    </table>
                  </div>
                  <div data-panel="po" class="hidden">
                    <table class="w-full text-sm">
                      <thead class="text-xs uppercase text-slate-400"><tr><th class="text-left font-semibold pb-2">PO Number</th><th class="text-left font-semibold pb-2">Vendor</th><th class="text-left font-semibold pb-2">Status</th><th class="text-right font-semibold pb-2">Total</th></tr></thead>
                      <tbody id="po-rows" class="divide-y divide-slate-100"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right: stock indicator -->
            <div class="space-y-4">
              <div class="bg-white rounded-xl border border-slate-200 p-5 text-center">
                <div class="text-xs uppercase tracking-wide text-slate-400 mb-2">Stock On Hand</div>
                <div class="text-5xl font-bold text-amber-500">18</div>
                <div class="mt-1 text-sm text-slate-500">pieces</div>
                <div class="mt-3">${'' /* badge injected */}<span id="stock-badge"></span></div>
                <div class="mt-3 h-2 rounded-full bg-slate-100 overflow-hidden"><div class="h-full bg-amber-400" style="width:72%"></div></div>
                <div class="mt-2 text-xs text-slate-400">Min threshold: 25 · Reorder recommended</div>
              </div>
              <div class="bg-white rounded-xl border border-slate-200 p-5">
                <div class="text-xs uppercase tracking-wide text-slate-400 mb-3">POS</div>
                <div class="flex items-center justify-between mb-2"><span class="text-sm text-slate-600">POS Enabled</span><span class="inline-flex h-5 w-9 items-center rounded-full bg-primary"><span class="h-4 w-4 rounded-full bg-white shadow translate-x-4"></span></span></div>
                <div class="flex items-center justify-between"><span class="text-sm text-slate-600">POS Price</span><span class="font-semibold text-slate-800">$9.99</span></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-raseed.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const item = App.seed.inventory[1];
    document.getElementById('info').innerHTML = [
      ['Name', item.name], ['SKU', item.sku], ['Category', item.category], ['Unit', item.unit],
      ['Storage Location', item.storage], ['Unit Cost', App.ui.money(item.cost)],
    ].map(([k, v]) => `<div class="field-row"><dt>${k}</dt><dd>${v}</dd></div>`).join('');

    document.getElementById('stock-badge').innerHTML = App.ui.badge('Low stock', 'amber');

    const TV = App.seed.txnTypeVariant;
    document.getElementById('ledger').innerHTML = App.seed.invLedger
      .map((t) => `<tr>
        <td class="py-2.5 text-slate-600 whitespace-nowrap">${t.date}</td>
        <td class="py-2.5">${App.ui.badge(t.type, TV[t.type])}</td>
        <td class="py-2.5 text-right font-medium ${t.qty < 0 ? 'text-red-600' : 'text-green-600'}">${t.qty > 0 ? '+' : ''}${t.qty}</td>
        <td class="py-2.5 pl-4 text-slate-500">${t.reason}</td>
        <td class="py-2.5 text-slate-600">${t.by}</td></tr>`)
      .join('');

    const PV = App.seed.poStatusVariant;
    document.getElementById('po-rows').innerHTML = App.seed.purchases.slice(0, 4)
      .map((p) => `<tr><td class="py-2.5 font-medium text-slate-700">${p.id}</td><td class="py-2.5 text-slate-600">${p.vendor}</td><td class="py-2.5">${App.ui.badge(p.status, PV[p.status])}</td><td class="py-2.5 text-right font-medium text-slate-700">${App.ui.money(p.total)}</td></tr>`)
      .join('');

    document.querySelectorAll('.tab-btn').forEach((btn) => btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('[data-panel]').forEach((p) => p.classList.toggle('hidden', p.dataset.panel !== btn.dataset.tab));
    }));

    App.ui.icons();
  </script>
</body>
</html>
