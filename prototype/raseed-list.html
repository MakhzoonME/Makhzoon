<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inventory — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="inventory" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              <div>
                <h1 class="text-xl font-semibold text-slate-900">Inventory <span class="text-slate-400 font-normal text-base">· Raseed</span></h1>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <button class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5"><i data-lucide="download" class="!w-4 !h-4"></i>Export</button>
              <button class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5"><i data-lucide="plus" class="!w-4 !h-4"></i>New Item</button>
            </div>
          </div>

          <!-- Module stats -->
          <div id="stats" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-5"></div>

          <div class="flex flex-wrap items-center gap-2 mb-3">
            <div class="relative">
              <i data-lucide="search" class="!w-4 !h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i>
              <input type="text" placeholder="Search items or SKU…" class="h-9 w-64 pl-9 pr-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
            </div>
            <select class="h-9 px-3 rounded-lg border border-slate-200 text-sm text-slate-600"><option>All stock status</option><option>OK</option><option>Low</option><option>Out</option></select>
            <select class="h-9 px-3 rounded-lg border border-slate-200 text-sm text-slate-600"><option>All categories</option><option>Beverages</option><option>Electronics</option><option>Supplies</option><option>Stationery</option></select>
            <label class="h-9 px-3 rounded-lg border border-slate-200 text-sm text-slate-600 inline-flex items-center gap-2"><input type="checkbox" class="rounded border-slate-300 text-primary focus:ring-primary" />POS enabled only</label>
          </div>

          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-3 text-left font-semibold">Item Name</th>
                  <th class="px-4 py-3 text-left font-semibold">SKU</th>
                  <th class="px-4 py-3 text-left font-semibold">Category</th>
                  <th class="px-4 py-3 text-left font-semibold">Stock Status</th>
                  <th class="px-4 py-3 text-right font-semibold">Qty On Hand</th>
                  <th class="px-4 py-3 text-right font-semibold">Min Threshold</th>
                  <th class="px-4 py-3 text-right font-semibold">Unit Cost</th>
                  <th class="px-4 py-3 text-center font-semibold">POS</th>
                  <th class="w-10 px-4 py-3"></th>
                </tr>
              </thead>
              <tbody id="rows" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-raseed.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const C = '#E65100';
    const statCards = [
      { label: 'Total Items', value: '10', icon: 'package' },
      { label: 'Low Stock', value: '2', icon: 'trending-down' },
      { label: 'Out of Stock', value: '2', icon: 'circle-x' },
      { label: 'Inventory Value', value: '$3.4K', icon: 'banknote' },
      { label: 'Open POs', value: '1', icon: 'shopping-cart' },
    ];
    document.getElementById('stats').innerHTML = statCards.map((s) => `<div class="bg-white rounded-xl border border-slate-200 border-l-4 p-4" style="border-left-color:${C}">
      <div class="flex items-center justify-between"><span class="text-[13px] font-medium text-slate-500">${s.label}</span><span class="grid place-items-center w-8 h-8 rounded-lg" style="background:${C}1a;color:${C}"><i data-lucide="${s.icon}" class="!w-4 !h-4"></i></span></div>
      <div class="mt-2 text-2xl font-bold text-slate-900">${s.value}</div></div>`).join('');

    const SV = App.seed.stockVariant, label = { ok: 'In stock', low: 'Low', out: 'Out' };
    document.getElementById('rows').innerHTML = App.seed.inventory
      .map(
        (i) => `<tr class="hover:bg-slate-50 cursor-pointer" onclick="if(!event.target.closest('.toggle'))location.href='raseed-detail.html'">
          <td class="px-4 py-3"><div class="font-medium text-slate-800">${i.name}</div><div class="text-xs text-slate-400">${i.id}</div></td>
          <td class="px-4 py-3 font-mono text-xs text-slate-500">${i.sku}</td>
          <td class="px-4 py-3 text-slate-600">${i.category}</td>
          <td class="px-4 py-3">${App.ui.statusDot(label[i.stock], SV[i.stock])}</td>
          <td class="px-4 py-3 text-right font-medium text-slate-800">${i.qty} <span class="text-xs text-slate-400">${i.unit}</span></td>
          <td class="px-4 py-3 text-right text-slate-500">${i.min}</td>
          <td class="px-4 py-3 text-right text-slate-600">${App.ui.money(i.cost)}</td>
          <td class="px-4 py-3 text-center" onclick="event.stopPropagation()">
            <button class="toggle inline-flex h-5 w-9 items-center rounded-full transition ${i.posEnabled ? 'bg-primary' : 'bg-slate-200'}" onclick="this.classList.toggle('bg-primary');this.classList.toggle('bg-slate-200');this.firstElementChild.classList.toggle('translate-x-4')">
              <span class="h-4 w-4 rounded-full bg-white shadow translate-x-0.5 ${i.posEnabled ? 'translate-x-4' : ''} transition"></span>
            </button>
          </td>
          <td class="px-4 py-3 text-slate-300" onclick="event.stopPropagation()"><i data-lucide="more-horizontal" class="!w-4 !h-4"></i></td>
        </tr>`
      )
      .join('');
    App.ui.icons();
  </script>
</body>
</html>
