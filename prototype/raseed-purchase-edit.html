<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Purchase Order — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="purchases" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6 max-w-3xl mx-auto">
          <a href="raseed-purchases.html" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 mb-3"><i data-lucide="arrow-left" class="!w-4 !h-4"></i>Purchase Orders</a>
          <div class="flex items-center justify-between mb-5">
            <div>
              <h1 class="text-xl font-semibold text-slate-900">Edit Purchase Order</h1>
              <p class="text-sm text-slate-500" id="po-sub"></p>
            </div>
            <button onclick="history.back()" class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5"><i data-lucide="save" class="!w-4 !h-4"></i>Save Changes</button>
          </div>

          <!-- Order details form -->
          <div class="bg-white rounded-xl border border-slate-200 mb-5">
            <div class="px-6 py-4 border-b border-slate-100">
              <h2 class="text-sm font-semibold text-slate-700">Order Details</h2>
            </div>
            <div class="p-6 space-y-5">
              <div class="grid grid-cols-2 gap-5">
                <div>
                  <label class="block text-sm font-medium text-slate-600 mb-1.5">Vendor</label>
                  <input id="f-vendor" type="text" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-600 mb-1.5">Status</label>
                  <select id="f-status" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary">
                    <option value="DRAFT">Draft</option>
                    <option value="ORDERED">Ordered</option>
                    <option value="PARTIAL">Partial</option>
                    <option value="RECEIVED">Received</option>
                    <option value="CANCELLED">Cancelled</option>
                  </select>
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-600 mb-1.5">Expected Delivery</label>
                  <input id="f-delivery" type="date" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-600 mb-1.5">Notes</label>
                <textarea id="f-notes" rows="3" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary resize-none" placeholder="Add any notes or instructions for this order…"></textarea>
              </div>
            </div>
          </div>

          <!-- Line items -->
          <div class="bg-white rounded-xl border border-slate-200">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between">
              <h2 class="text-sm font-semibold text-slate-700">Line Items</h2>
              <span class="text-xs text-slate-400" id="item-count"></span>
            </div>
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide">
                <tr>
                  <th class="px-4 py-3 text-left font-semibold">Item</th>
                  <th class="px-4 py-3 text-right font-semibold">Qty</th>
                  <th class="px-4 py-3 text-right font-semibold">Unit Cost</th>
                  <th class="px-4 py-3 text-right font-semibold">Line Total</th>
                </tr>
              </thead>
              <tbody id="line-rows" class="divide-y divide-slate-100"></tbody>
              <tfoot class="border-t border-slate-200 bg-slate-50">
                <tr>
                  <td colspan="3" class="px-4 py-3 text-right text-sm font-semibold text-slate-600">Order Total</td>
                  <td class="px-4 py-3 text-right text-sm font-bold text-slate-900" id="order-total"></td>
                </tr>
              </tfoot>
            </table>
          </div>

          <div class="mt-4 flex justify-end gap-2">
            <a href="raseed-purchases.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5">Cancel</a>
            <button onclick="history.back()" class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5"><i data-lucide="save" class="!w-4 !h-4"></i>Save Changes</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-raseed.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const po = App.seed.purchases[0];
    document.getElementById('po-sub').textContent = po.id + ' · ' + po.vendor;
    document.getElementById('f-vendor').value = po.vendor;
    const statusSel = document.getElementById('f-status');
    [...statusSel.options].forEach((o) => { if (o.value === po.status) o.selected = true; });
    document.getElementById('f-delivery').value = '2026-06-20';
    document.getElementById('item-count').textContent = po.items + ' items';

    // Static mock line items derived from inventory to fill the PO
    const lineItems = [
      { name: 'Thermal Receipt Paper 80mm', sku: 'PAP-80MM', qty: 200, unitCost: 0.85 },
      { name: 'USB-C Cable 1m', sku: 'CBL-USBC-1M', qty: 50, unitCost: 3.2 },
      { name: 'Wireless Mouse', sku: 'ELC-MSE-WL', qty: 10, unitCost: 8.5 },
      { name: 'AA Batteries (4-pack)', sku: 'BAT-AA-4', qty: 80, unitCost: 1.5 },
      { name: 'Notebook A5', sku: 'STN-NB-A5', qty: 100, unitCost: 1.1 },
    ];
    document.getElementById('line-rows').innerHTML = lineItems.map((r) => {
      const total = r.qty * r.unitCost;
      return `<tr class="hover:bg-slate-50">
        <td class="px-4 py-3">
          <div class="font-medium text-slate-800">${r.name}</div>
          <div class="text-xs text-slate-400 font-mono">${r.sku}</div>
        </td>
        <td class="px-4 py-3 text-right text-slate-600">${r.qty}</td>
        <td class="px-4 py-3 text-right text-slate-600">${App.ui.money(r.unitCost)}</td>
        <td class="px-4 py-3 text-right font-medium text-slate-800">${App.ui.money(total)}</td>
      </tr>`;
    }).join('');
    document.getElementById('order-total').textContent = App.ui.money(po.total);
    App.ui.icons();
  </script>
</body>
</html>
