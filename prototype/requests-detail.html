<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>REQ-0038 — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="requests" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6 max-w-[820px] mx-auto">
          <a href="requests-list.html" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 mb-3"><i data-lucide="arrow-left" class="!w-4 !h-4"></i>Back to Requests</a>

          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100">
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-3"><span id="type"></span><h1 class="text-lg font-semibold text-slate-900">REQ-0038</h1><span id="status"></span></div>
              </div>
              <p class="text-sm text-slate-500 mt-2">Submitted by <span class="font-medium text-slate-700">Nour Saleh</span> · 2026-06-12</p>
            </div>

            <div class="px-6 py-5 space-y-5">
              <div>
                <div class="text-xs uppercase tracking-wide text-slate-400 mb-1.5">Description</div>
                <p id="desc" class="text-sm text-slate-700 leading-relaxed"></p>
              </div>
              <div>
                <div class="text-xs uppercase tracking-wide text-slate-400 mb-1.5">Linked Record</div>
                <a href="raseed-detail.html" class="inline-flex items-center gap-2 px-3 py-2 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm"><span class="w-6 h-6 rounded bg-raseed/10 text-raseed grid place-items-center"><i data-lucide="package" class="!w-3.5 !h-3.5"></i></span><span class="font-medium text-slate-700" id="linked"></span></a>
              </div>
            </div>

            <!-- Admin action bar -->
            <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex items-center gap-3">
              <span class="text-sm text-slate-500 mr-auto">Admin actions</span>
              <button class="h-10 px-5 rounded-lg bg-green-600 text-white text-sm font-semibold hover:bg-green-700 inline-flex items-center gap-1.5"><i data-lucide="check" class="!w-4 !h-4"></i>Approve</button>
              <button class="h-10 px-5 rounded-lg bg-red-600 text-white text-sm font-semibold hover:bg-red-700 inline-flex items-center gap-1.5"><i data-lucide="x" class="!w-4 !h-4"></i>Reject</button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-misc.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const r = App.seed.requestDetail;
    document.getElementById('type').innerHTML = App.ui.badge(r.type, App.seed.requestTypeVariant[r.type]);
    document.getElementById('status').innerHTML = App.ui.badge(r.status, App.seed.requestStatusVariant[r.status]);
    document.getElementById('desc').textContent = r.description;
    document.getElementById('linked').textContent = r.linked;
    App.ui.icons();
  </script>
</body>
</html>
