<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings · Card Terminal — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="settings" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <h1 class="text-xl font-semibold text-slate-900 mb-5">Settings</h1>
          <div class="flex gap-6">
            <nav id="settings-nav" class="w-56 shrink-0 space-y-1"></nav>

            <div class="flex-1 max-w-2xl">
              <div class="bg-white rounded-xl border border-slate-200">
                <div class="px-6 py-4 border-b border-slate-100">
                  <h2 class="font-semibold text-slate-800">Card Terminal</h2>
                  <p class="text-sm text-slate-500">Integrate a card payment terminal with your POS</p>
                </div>
                <div class="p-6 space-y-5">

                  <!-- Section: Connection -->
                  <p class="text-xs font-semibold uppercase tracking-wide text-slate-400">Connection</p>

                  <!-- Enable Card Terminal -->
                  <div class="flex items-center justify-between">
                    <div>
                      <p class="text-sm font-medium text-slate-700">Enable Card Terminal</p>
                      <p class="text-xs text-slate-400 mt-0.5">Activate card payment integration on the POS</p>
                    </div>
                    <button class="inline-flex h-5 w-9 items-center rounded-full transition bg-slate-200" onclick="this.classList.toggle('bg-primary');this.classList.toggle('bg-slate-200');this.firstElementChild.classList.toggle('translate-x-4')"><span class="h-4 w-4 rounded-full bg-white shadow transition"></span></button>
                  </div>

                  <!-- Mode -->
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Mode</label>
                    <select class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary">
                      <option>Display only (QR / manual entry)</option>
                      <option>Local bridge (USB/LAN)</option>
                      <option>Cloud webhook</option>
                    </select>
                  </div>

                  <!-- Bridge URL -->
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Bridge URL</label>
                    <input type="text" value="http://localhost:7433" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                  </div>

                  <div class="pt-2 border-t border-slate-100"></div>

                  <!-- Section: Provider -->
                  <p class="text-xs font-semibold uppercase tracking-wide text-slate-400">Provider</p>

                  <!-- Provider -->
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Provider</label>
                    <select class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary">
                      <option>SumUp</option>
                      <option>Square</option>
                      <option>Paymob</option>
                      <option>Custom</option>
                    </select>
                  </div>

                  <!-- API Key -->
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">API Key</label>
                    <input type="password" placeholder="sk_live_..." class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                  </div>

                  <!-- Terminal ID -->
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Terminal ID</label>
                    <input type="text" placeholder="term_..." class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                  </div>

                  <div class="pt-2 border-t border-slate-100"></div>

                  <!-- Section: Advanced -->
                  <p class="text-xs font-semibold uppercase tracking-wide text-slate-400">Advanced</p>

                  <!-- Payment timeout -->
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Payment timeout (seconds)</label>
                    <input type="number" value="60" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                  </div>

                  <!-- Info box -->
                  <div class="flex items-start gap-2.5 p-3 rounded-lg bg-slate-50 border border-slate-200 text-sm text-slate-600">
                    <i data-lucide="info" class="!w-4 !h-4 shrink-0 mt-0.5 text-slate-400"></i>
                    Webhook URL for cloud providers: <span class="font-mono text-xs ml-1 text-slate-700">https://app.makhzoon.me/api/haraka/card-payment-result</span>
                  </div>

                  <!-- Test Connection button -->
                  <div>
                    <button onclick="alert('Connection test: OK')" class="h-10 px-4 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-2">
                      <i data-lucide="credit-card" class="!w-4 !h-4 text-slate-400"></i>Test Connection
                    </button>
                  </div>

                  <!-- Save / Cancel -->
                  <div class="flex items-center gap-2 pt-2 border-t border-slate-100">
                    <button class="h-10 px-5 rounded-lg bg-primary text-white text-sm font-semibold hover:opacity-90">Save Changes</button>
                    <button class="h-10 px-5 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
                  </div>

                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    document.getElementById('settings-nav').innerHTML = App.ui.settingsNav('card-terminal');
    App.ui.icons();
  </script>
</body>
</html>
