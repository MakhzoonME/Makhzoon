<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings · Subscription — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="settings" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <h1 class="text-xl font-semibold text-slate-900 mb-5">Settings</h1>
          <div class="flex gap-6">
            <nav id="settings-nav" class="w-56 shrink-0 space-y-1"></nav>
            <div class="flex-1 max-w-3xl space-y-6">
              <!-- Current plan -->
              <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
                <div class="px-6 py-5 border-b border-slate-100 flex items-start justify-between">
                  <div>
                    <div class="flex items-center gap-2"><h2 class="text-lg font-semibold text-slate-900">Business Plan</h2><span class="inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-primary/10 text-primary ring-1 ring-primary/20">Current</span></div>
                    <p class="text-sm text-slate-500 mt-1">Renews on July 1, 2026 · $99/month</p>
                  </div>
                  <button class="h-9 px-4 rounded-lg bg-primary text-white text-sm font-semibold hover:opacity-90">Upgrade</button>
                </div>
                <div class="p-6 grid grid-cols-2 gap-6">
                  <div>
                    <div class="text-xs uppercase tracking-wide text-slate-400 mb-2">Included Features</div>
                    <ul class="space-y-1.5 text-sm">
                      <li class="flex items-center gap-2 text-slate-700"><i data-lucide="check" class="!w-4 !h-4 text-green-600"></i>Usool (Assets)</li>
                      <li class="flex items-center gap-2 text-slate-700"><i data-lucide="check" class="!w-4 !h-4 text-green-600"></i>Raseed (Inventory)</li>
                      <li class="flex items-center gap-2 text-slate-700"><i data-lucide="check" class="!w-4 !h-4 text-green-600"></i>Haraka (POS + Orders)</li>
                      <li class="flex items-center gap-2 text-slate-700"><i data-lucide="check" class="!w-4 !h-4 text-green-600"></i>Audit Logs</li>
                      <li class="flex items-center gap-2 text-slate-700"><i data-lucide="check" class="!w-4 !h-4 text-green-600"></i>Priority Support</li>
                    </ul>
                  </div>
                  <div>
                    <div class="text-xs uppercase tracking-wide text-slate-400 mb-2">Usage Limits</div>
                    <div class="space-y-3">
                      <div><div class="flex justify-between text-sm mb-1"><span class="text-slate-600">Assets</span><span class="font-medium text-slate-800">50 / 200</span></div><div class="h-2 rounded-full bg-slate-100"><div class="h-full rounded-full bg-primary" style="width:25%"></div></div></div>
                      <div><div class="flex justify-between text-sm mb-1"><span class="text-slate-600">Users</span><span class="font-medium text-slate-800">6 / 25</span></div><div class="h-2 rounded-full bg-slate-100"><div class="h-full rounded-full bg-primary" style="width:24%"></div></div></div>
                      <div><div class="flex justify-between text-sm mb-1"><span class="text-slate-600">Spaces</span><span class="font-medium text-slate-800">3 / 10</span></div><div class="h-2 rounded-full bg-slate-100"><div class="h-full rounded-full bg-primary" style="width:30%"></div></div></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    document.getElementById('settings-nav').innerHTML = App.ui.settingsNav('subscription');
    App.ui.icons();
  </script>
</body>
</html>
