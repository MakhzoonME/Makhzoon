<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings · Warranty Certificates — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="settings" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6">
          <h1 class="text-xl font-semibold text-slate-900 mb-5">Settings</h1>
          <div class="flex gap-6">
            <nav id="settings-nav" class="w-56 shrink-0 space-y-1"></nav>

            <div class="flex-1 flex gap-6 items-start min-w-0">
              <!-- Form -->
              <div class="flex-1 max-w-xl bg-white rounded-xl border border-slate-200">
                <div class="px-6 py-4 border-b border-slate-100"><h2 class="font-semibold text-slate-800">Warranty Certificates</h2><p class="text-sm text-slate-500">Customize the certificate issued for asset and item warranties</p></div>
                <div class="p-6 space-y-5">
                  <div><label class="block text-sm font-medium text-slate-600 mb-1.5">Certificate Title</label><input id="wc-title" type="text" value="Certificate of Warranty" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" /></div>
                  <div><label class="block text-sm font-medium text-slate-600 mb-1.5">Header Text</label><input id="wc-header" type="text" value="Acme Corp" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" /></div>
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Accent Color</label>
                    <div class="flex items-center gap-2">
                      <input id="wc-color" type="color" value="#00695C" class="h-10 w-14 rounded-lg border border-slate-200 p-1" />
                      <span class="text-sm text-slate-500">Used for the certificate title and border</span>
                    </div>
                  </div>
                  <div><label class="block text-sm font-medium text-slate-600 mb-1.5">Footer Text</label><textarea id="wc-footer" rows="3" class="w-full px-3 py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary">This certificate confirms the warranty coverage for the item described above, subject to the vendor's terms and conditions.</textarea></div>
                  <div class="space-y-3 pt-2">
                    <label class="flex items-center gap-2.5 text-sm text-slate-700"><input id="wc-logo" type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary" />Show organization logo</label>
                    <label class="flex items-center gap-2.5 text-sm text-slate-700"><input id="wc-qr" type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary" />Show QR code for verification</label>
                    <label class="flex items-center gap-2.5 text-sm text-slate-700"><input id="wc-signature" type="checkbox" checked class="rounded border-slate-300 text-primary focus:ring-primary" />Show authorized signature line</label>
                  </div>
                  <div class="flex items-center gap-2 pt-2 border-t border-slate-100">
                    <button class="h-10 px-5 rounded-lg bg-primary text-white text-sm font-semibold hover:opacity-90">Save Changes</button>
                    <button class="h-10 px-5 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">Cancel</button>
                  </div>
                </div>
              </div>

              <!-- Preview -->
              <div class="w-[380px] shrink-0 sticky top-0">
                <div class="bg-white rounded-xl border border-slate-200 p-4">
                  <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-3">Preview</div>
                  <div id="preview" class="rounded-lg p-5 bg-white text-[13px] text-slate-700"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-misc.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    document.getElementById('settings-nav').innerHTML = App.ui.settingsNav('warranties');

    const w = App.seed.warranties[0];

    function renderPreview() {
      const title = document.getElementById('wc-title').value || 'Certificate of Warranty';
      const header = document.getElementById('wc-header').value || 'Acme Corp';
      const color = document.getElementById('wc-color').value;
      const footer = document.getElementById('wc-footer').value;
      const showLogo = document.getElementById('wc-logo').checked;
      const showQr = document.getElementById('wc-qr').checked;
      const showSig = document.getElementById('wc-signature').checked;

      document.getElementById('preview').innerHTML = `
        <div class="border-2 rounded-lg p-5" style="border-color:${color}">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-2">
              ${showLogo ? App.ui.logoMark(28) : ''}
              <span class="font-semibold text-slate-800">${header}</span>
            </div>
            <span class="text-[11px] text-slate-400 font-mono">WC-2026-000031</span>
          </div>
          <div class="text-center mb-4">
            <div class="text-lg font-bold tracking-wide" style="color:${color}">${title}</div>
          </div>
          <div class="space-y-1.5 text-[12px] mb-4">
            <div class="flex justify-between"><span class="text-slate-400">Asset</span><span class="font-medium text-slate-700">${w.asset}</span></div>
            <div class="flex justify-between"><span class="text-slate-400">Vendor</span><span class="font-medium text-slate-700">${w.vendor}</span></div>
            <div class="flex justify-between"><span class="text-slate-400">Coverage Start</span><span class="font-medium text-slate-700">${w.start}</span></div>
            <div class="flex justify-between"><span class="text-slate-400">Coverage End</span><span class="font-medium text-slate-700">${w.end}</span></div>
          </div>
          ${showQr ? `<div class="flex justify-center mb-4">${App.ui.fakeQR('warranty', 88)}</div>` : ''}
          <div class="text-[11px] text-slate-400 text-center mb-4">${footer}</div>
          ${showSig ? `<div class="pt-6 flex justify-center"><div class="text-center"><div class="w-40 border-t border-slate-300 mb-1"></div><div class="text-[11px] text-slate-400">Authorized Signature</div></div></div>` : ''}
        </div>
      `;
    }

    ['wc-title', 'wc-header', 'wc-color', 'wc-footer', 'wc-logo', 'wc-qr', 'wc-signature'].forEach((id) => {
      document.getElementById(id).addEventListener('input', renderPreview);
    });

    renderPreview();
    App.ui.icons();
  </script>
</body>
</html>
