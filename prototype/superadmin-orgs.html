<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Organizations · Superadmin — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="sa-orgs" data-portal="superadmin" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <!-- Transfer Mode banner -->
        <div id="transfer-banner" class="hidden items-center gap-3 px-6 py-3 bg-amber-100 border-b border-amber-200 text-amber-900 text-sm">
          <i data-lucide="alert-triangle" class="!w-4 !h-4"></i>
          <span><strong>Transfer Mode</strong> — Viewing as <span id="transfer-org">Acme Corp</span>.</span>
          <button onclick="exitTransfer()" class="ml-auto font-semibold underline hover:no-underline">Exit Transfer Mode</button>
        </div>

        <div class="p-6">
          <div class="flex items-center justify-between mb-4">
            <div><h1 class="text-xl font-semibold text-slate-900">Organizations</h1><p class="text-sm text-slate-500">8 organizations · 2 suspended</p></div>
            <button class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5"><i data-lucide="plus" class="!w-4 !h-4"></i>New Organization</button>
          </div>
          <div class="flex items-center gap-2 mb-3">
            <div class="relative"><i data-lucide="search" class="!w-4 !h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2"></i><input type="text" placeholder="Search organizations…" class="h-9 w-64 pl-9 pr-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" /></div>
            <select class="h-9 px-3 rounded-lg border border-slate-200 text-sm text-slate-600"><option>All packages</option><option>Starter</option><option>Growth</option><option>Business</option></select>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wide"><tr>
                <th class="px-4 py-3 text-left font-semibold">Org Name</th><th class="px-4 py-3 text-left font-semibold">Slug</th>
                <th class="px-4 py-3 text-left font-semibold">Package</th><th class="px-4 py-3 text-left font-semibold">Status</th>
                <th class="px-4 py-3 text-right font-semibold">Members</th><th class="px-4 py-3 text-right font-semibold">Spaces</th>
                <th class="px-4 py-3 text-left font-semibold">Created</th><th class="px-4 py-3 text-right font-semibold">Actions</th>
              </tr></thead>
              <tbody id="rows" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-misc.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const SV = App.seed.orgStatusVariant, PV = App.seed.pkgVariant;
    document.getElementById('rows').innerHTML = App.seed.orgs.map((o) => `<tr class="hover:bg-slate-50">
      <td class="px-4 py-3 font-medium text-slate-800">${o.name}</td>
      <td class="px-4 py-3 font-mono text-xs text-slate-500">${o.slug}</td>
      <td class="px-4 py-3">${App.ui.badge(o.pkg, PV[o.pkg])}</td>
      <td class="px-4 py-3">${App.ui.badge(o.status, SV[o.status])}</td>
      <td class="px-4 py-3 text-right text-slate-600">${o.members}</td>
      <td class="px-4 py-3 text-right text-slate-600">${o.spaces}</td>
      <td class="px-4 py-3 text-slate-500">${o.created}</td>
      <td class="px-4 py-3">
        <div class="flex items-center justify-end gap-1">
          <button title="View" class="w-8 h-8 grid place-items-center rounded-lg text-slate-500 hover:bg-slate-100 hover:text-primary"><i data-lucide="eye" class="!w-4 !h-4"></i></button>
          <button title="Transfer (enter org)" onclick="enterTransfer('${o.name}')" class="w-8 h-8 grid place-items-center rounded-lg text-slate-500 hover:bg-amber-50 hover:text-amber-600"><i data-lucide="arrow-left-right" class="!w-4 !h-4"></i></button>
          <button title="${o.status === 'Suspended' ? 'Reactivate' : 'Suspend'}" class="w-8 h-8 grid place-items-center rounded-lg text-slate-500 hover:bg-red-50 hover:text-red-600"><i data-lucide="${o.status === 'Suspended' ? 'circle-play' : 'ban'}" class="!w-4 !h-4"></i></button>
        </div>
      </td></tr>`).join('');

    function enterTransfer(name) {
      document.getElementById('transfer-org').textContent = name;
      const b = document.getElementById('transfer-banner');
      b.classList.remove('hidden'); b.classList.add('flex');
      window.scrollTo({ top: 0 });
    }
    function exitTransfer() { const b = document.getElementById('transfer-banner'); b.classList.add('hidden'); b.classList.remove('flex'); }
    App.ui.icons();
  </script>
</body>
</html>
