<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Asset — Makhzoon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind.config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Capriola&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/tokens.css" />
</head>
<body data-page="assets" data-portal="org" class="bg-slate-50 text-slate-800 antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="shrink-0 bg-white border-r border-slate-200 flex flex-col"></aside>
    <div class="flex-1 flex flex-col min-w-0">
      <header id="topbar" class="shrink-0 bg-white border-b border-slate-200"></header>
      <main id="outlet" class="flex-1 overflow-auto">
        <div class="p-6 max-w-2xl mx-auto">
          <a href="usool-list.html" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 mb-3"><i data-lucide="arrow-left" class="!w-4 !h-4"></i>Assets</a>
          <div class="flex items-center justify-between mb-5">
            <h1 class="text-xl font-semibold text-slate-900">Edit Asset</h1>
            <button onclick="history.back()" class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5"><i data-lucide="save" class="!w-4 !h-4"></i>Save Changes</button>
          </div>

          <div class="bg-white rounded-xl border border-slate-200">
            <div class="px-6 py-4 border-b border-slate-100">
              <h2 class="text-sm font-semibold text-slate-700">Asset Details</h2>
            </div>
            <div class="p-6 space-y-5">
              <div class="grid grid-cols-2 gap-5">
                <!-- Left column -->
                <div class="space-y-5">
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Asset Name</label>
                    <input id="f-name" type="text" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Category</label>
                    <select id="f-category" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary">
                      <option>Laptop</option>
                      <option>Monitor</option>
                      <option>Phone</option>
                      <option>Furniture</option>
                      <option>Vehicle</option>
                      <option>Equipment</option>
                      <option>Other</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Serial No.</label>
                    <input id="f-serial" type="text" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary font-mono" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Purchase Date</label>
                    <input id="f-date" type="date" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Purchase Cost</label>
                    <div class="relative">
                      <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm text-slate-400">$</span>
                      <input id="f-cost" type="number" step="0.01" min="0" class="w-full h-10 pl-7 pr-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                    </div>
                  </div>
                </div>
                <!-- Right column -->
                <div class="space-y-5">
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Status</label>
                    <select id="f-status" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary">
                      <option>Active</option>
                      <option>Checked Out</option>
                      <option>In Repair</option>
                      <option>Retired</option>
                    </select>
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Assigned To</label>
                    <input id="f-assigned" type="text" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Location</label>
                    <input id="f-location" type="text" class="w-full h-10 px-3 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary" />
                  </div>
                  <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1.5">Notes</label>
                    <textarea id="f-notes" rows="4" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-primary resize-none" placeholder="Add any notes about this asset…"></textarea>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="mt-4 flex justify-end gap-2">
            <a href="usool-list.html" class="h-9 px-3 rounded-lg border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50 inline-flex items-center gap-1.5">Cancel</a>
            <button onclick="history.back()" class="h-9 px-3 rounded-lg bg-primary text-white text-sm font-medium hover:opacity-90 inline-flex items-center gap-1.5"><i data-lucide="save" class="!w-4 !h-4"></i>Save Changes</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/data/seed-core.js"></script>
  <script src="js/data/seed-usool.js"></script>
  <script src="js/core/components.js"></script>
  <script src="js/core/sidebar.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/shell.js"></script>
  <script>
    const asset = App.seed.assets[0];
    document.getElementById('f-name').value = asset.name;
    document.getElementById('f-serial').value = asset.serial;
    document.getElementById('f-cost').value = asset.cost;
    document.getElementById('f-assigned').value = asset.assignedTo;
    document.getElementById('f-location').value = asset.location;
    document.getElementById('f-date').value = '2025-09-01';
    const catSel = document.getElementById('f-category');
    [...catSel.options].forEach((o) => { if (o.value === asset.category) o.selected = true; });
    const statusSel = document.getElementById('f-status');
    [...statusSel.options].forEach((o) => { if (o.value === asset.status) o.selected = true; });
    App.ui.icons();
  </script>
</body>
</html>
