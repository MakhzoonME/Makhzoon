# Makhzoon — Cloudflare Workers deploy via @opennextjs/cloudflare.
# Replaces AWS Amplify (amplify.yml removed) and Vercel (vercel.json removed;
# crons moved to workers/cron). Build/deploy: `npm run cf:deploy`.
#
# Branch → environment mapping:
#   DevBranch  → `wrangler deploy --env dev`     (dev.makhzoon.me)
#   STGBranch  → `wrangler deploy --env staging` (stage.makhzoon.me)
#   main       → `wrangler deploy --env production` (app.makhzoon.me)
#
# Vars below in [vars] apply to ALL environments.
# Override per env in [env.<name>.vars] where values differ.
# Secrets must still be set via `wrangler secret put --env <name>` or dashboard.

name = "makhzoon"
main = ".open-next/worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# ── Dev ─────────────────────────────────────────────────────────────
[env.dev]
name = "makhzoondev"

[env.dev.vars]
NEXT_PUBLIC_SUPABASE_URL = "https://icepozpnwxnqhdzmpyco.supabase.co"
NEXT_PUBLIC_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImljZXBvenBud3hucWhkem1weWNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MTkwMTYsImV4cCI6MjA5NDQ5NTAxNn0.yLN0RSvNb_AYRJhM0yLmj3RBJWY_9Xx3IE36CNdGRK8"
