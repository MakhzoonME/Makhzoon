# Makhzoon — Cloudflare Workers deploy via @opennextjs/cloudflare.
# Replaces AWS Amplify (amplify.yml removed) and Vercel (vercel.json removed;
# crons moved to workers/cron). Build/deploy: `npm run cf:deploy`.
#
# Branch → environment mapping:
#   DevBranch  → `wrangler deploy --env dev`     (dev.makhzoon.me)
#   STGBranch  → `wrangler deploy --env staging` (stage.makhzoon.me)
#   main       → `wrangler deploy --env production` (app.makhzoon.me)
#
# ═══════════════════════════════════════════════════════════════════════
# IMPORTANT: Secrets (not vars) — set via `wrangler secret put --env <name>`
# ═══════════════════════════════════════════════════════════════════════
# The following values are SECRETS (DO NOT put in this file):
#   SUPABASE_SERVICE_ROLE_KEY   — Supabase service-role key (admin bypass RLS)
#   RESEND_API_KEY              — Resend transactional email API key
#   CRON_SECRET                 — Shared Bearer token for cron auth
#   GOOGLE_DRIVE_PRIVATE_KEY    — Google Drive service-account private key
#   FAWTARA_SECRET_ENC_KEY      — ZATCA e-invoicing encryption key
#
# Vars in [vars] or [env.<name>.vars] are visible to the Worker at runtime.
# The Google Drive client email & folder ID are safe as vars (they are
# identifiers, not secrets). The private key IS a secret.
# ═══════════════════════════════════════════════════════════════════════

name = "makhzoon"
main = ".open-next/worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# ── Dev ─────────────────────────────────────────────────────────────
[env.dev]
